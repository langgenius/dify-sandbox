app:
  port: 8194
  debug: True
  key: dify-sandbox
max_workers: 4
max_requests: 50
worker_timeout: 5
python_path: /usr/local/bin/python3
enable_network: True # please make sure there is no network risk in your environment
enable_preload: False # please keep it as False for security purposes
allowed_syscalls: # please leave it empty if you have no idea how seccomp works
proxy:
  socks5: ''
  http: ''
  https: ''
# Worker pool mode: reuses persistent python/nodejs processes instead of
# forking a new process for every request.  Disabled by default.
# Enable with env WORKER_POOL_ENABLED=true or set enabled: true below.
worker_pool:
  enabled: false
  python_workers: 4   # number of pre-warmed Python processes
  nodejs_workers: 2   # number of pre-warmed Node.js processes
