# Version configuration file - centralized management of all software versions
versions:
  # Base images
  python: "python:3.12-slim-bookworm"
  golang: "1.24.13"
  nodejs: "v20.20.0"

  # Python packages (unified configuration)
  python_packages: "httpx==0.27.2 requests==2.32.3 jinja2==3.1.6 PySocks httpx[socks] numpy pandas thefuzz pydantic matplotlib scikit-learn"

  # System packages
  system_packages:
    - pkg-config
    - libseccomp-dev
    - wget
    - curl
    - xz-utils
    - zlib1g
    - expat
    - perl
    - libsqlite3-0

  # Build dependencies
  build_packages:
    - pkg-config
    - gcc
    - libseccomp-dev

# Mirror configuration
mirrors:
  nodejs: "https://nodejs.org/dist"
  golang: "https://golang.org/dl"

# Architecture-specific configuration
architectures:
  amd64:
    golang_arch: "linux-amd64"
    nodejs_arch: "linux-x64"
  arm64:
    golang_arch: "linux-arm64"
    nodejs_arch: "linux-arm64"
